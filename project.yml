name: Pickture
options:
  bundleIdPrefix: com.jayl2kor
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  Pickture:
    type: application
    platform: iOS
    sources:
      - Pickture
    settings:
      base:
        INFOPLIST_FILE: Pickture/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jayl2kor.pickture
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
